id: "openarm01"

calibration_dir: "/home/user/openarm/calib"

node_name: "openarm_robot_node"

topics_to_subscribe:
    joint_states:
      topic: "/joint_states"
      type: "JointState"

topics_to_publish:
    joint_trajectory:
      topic: "/my_robot/joint_trajectory"
      type: "JointTrajectory"

joints:
  - name: joint1
  - name: joint2
  - name: joint3
  - name: joint4
  - name: joint5
  - name: joint6

cameras:
  cam0:
    width: 640
    height: 480
    fps: 30
    topic: "/camera/color/image_raw"
    info_topic: "/camera/color/camera_info"
